<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LINEで相談する | ひとさじ</title>
  <meta name="description" content="ひとさじのLINE公式アカウントから、ホームページ制作についてご相談いただけます。">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;500;600;700&family=EB+Garamond:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f8f5ef;
      --bg-soft: #f3eee6;
      --panel: rgba(251, 248, 242, 0.88);
      --text: #2c2825;
      --light: #6b6560;
      --line: #c9c1b7;
      --accent: #8a7e72;
      --font-mincho: 'Shippori Mincho', serif;
      --font-garamond: 'EB Garamond', serif;
    }

    body {
      min-height: 100vh;
      font-family: var(--font-mincho);
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(233, 222, 208, 0.9), transparent 34%),
        radial-gradient(circle at bottom right, rgba(230, 221, 210, 0.8), transparent 30%),
        linear-gradient(160deg, #fbf8f2 0%, var(--bg-soft) 100%);
      letter-spacing: 0.08em;
      line-height: 2.1;
      display: grid;
      place-items: center;
      padding: 32px 20px;
    }

    .card {
      width: min(100%, 760px);
      padding: 48px 40px;
      border: 1px solid var(--line);
      border-radius: 28px;
      background: var(--panel);
      backdrop-filter: blur(10px);
      box-shadow: 0 18px 60px rgba(58, 54, 50, 0.08);
      text-align: center;
    }

    .eyebrow {
      display: block;
      font-family: var(--font-garamond);
      font-size: 0.9rem;
      font-style: italic;
      color: var(--accent);
      letter-spacing: 0.24em;
      margin-bottom: 18px;
    }

    h1 {
      font-size: clamp(1.5rem, 3.4vw, 2.4rem);
      font-weight: 500;
      line-height: 1.8;
      margin-bottom: 16px;
    }

    .lead {
      max-width: 540px;
      margin: 0 auto 32px;
      font-size: 0.9rem;
      color: var(--light);
    }

    .qr-wrap {
      width: min(100%, 340px);
      margin: 0 auto 28px;
      padding: 18px;
      border-radius: 22px;
      background: rgba(255, 255, 255, 0.72);
      border: 1px solid rgba(201, 193, 183, 0.8);
    }

    .qr-wrap img {
      display: block;
      width: 100%;
      height: auto;
    }

    .note {
      max-width: 560px;
      margin: 0 auto 30px;
      font-size: 0.8rem;
      color: var(--light);
    }

    .btn {
      display: inline-block;
      padding: 14px 34px;
      border: 1px solid var(--text);
      color: var(--text);
      font-size: 0.82rem;
      letter-spacing: 0.14em;
      transition: background 0.25s ease, color 0.25s ease;
    }

    .btn:hover {
      background: var(--text);
      color: #f7f5f2;
    }

    .sub {
      margin-top: 22px;
      font-size: 0.75rem;
      color: var(--light);
    }

    .back {
      display: inline-block;
      margin-top: 28px;
      font-size: 0.76rem;
      color: var(--accent);
      border-bottom: 1px solid currentColor;
      line-height: 1.8;
    }

    @media (max-width: 640px) {
      .card {
        padding: 36px 22px;
        border-radius: 22px;
      }

      .lead {
        font-size: 0.84rem;
      }
    }
  </style>
</head>
<body>
  <main class="card">
    <span class="eyebrow">Official LINE</span>
    <h1>LINEから、<br>静かにご相談いただけます。</h1>
    <p class="lead">ホームページ制作についてのご相談は、ひとさじのLINE公式アカウントから承っています。文章がまだまとまっていなくても大丈夫です。</p>

    <div class="qr-wrap">
      <img src="../img/line-qr.png" alt="ひとさじ LINE公式アカウントのQRコード">
    </div>

    <p class="note">スマートフォンの方は下のボタンから、パソコンの方はQRコードをLINEで読み取ってご連絡ください。活動内容、作りたい理由、載せたい内容、ご希望の雰囲気など、わかる範囲でお送りいただけます。</p>

    <a class="btn" href="https://lin.ee/PRI24cC" target="_blank" rel="noopener noreferrer">LINE公式を開く</a>
    <p class="sub">確認後、2日以内を目安にご返信いたします。</p>
    <a class="back" href="../">トップページへ戻る</a>
  </main>
</body>
</html>
